# =====================
# Application Config
# =====================

spring.application.name=Castle Financial Services

# =====================
# Server Configuration
# =====================
server.port=${PORT:8080}       # Railway provides PORT; defaults to 8080 locally
server.address=0.0.0.0         # Allow access from network (for mobile testing)
server.error.include-message=always
server.error.include-binding-errors=always

# =====================
# PostgreSQL Datasource
# =====================
# Local defaults (you can override with Railway env vars)
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:webloan}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari connection pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# =====================
# JPA / Hibernate
# =====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# =====================
# Thymeleaf
# =====================
spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# =====================
# Actuator
# =====================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# =====================
# Logging
# =====================
logging.level.com.sachin.webLoan=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=ERROR
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
